appId: com.laststance.engage
tags:
  - ios
  - smoke
---
# QA-01: App Launch
# Fast smoke check for launch-only diagnosis; the main suite covers launch via navigation.

- launchApp:
    clearState: true

- extendedWaitUntil:
    visible:
      id: "calendar-screen"
    timeout: 10000

- assertVisible:
    id: "calendar-title"

- assertVisible:
    text: "Select a date to manage tasks and reflections"

- assertVisible:
    id: "calendar-prev-month"

- assertVisible:
    id: "calendar-next-month"
