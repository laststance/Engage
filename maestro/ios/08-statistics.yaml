appId: com.laststance.engage
tags:
  - ios
  - manual
---
# QA-08: Statistics
# Manual redundancy check; component tests cover the toggle and QA-02 covers tab reachability.

- launchApp:
    clearState: true

- extendedWaitUntil:
    visible:
      id: "calendar-screen"
    timeout: 10000

# Navigate to Stats tab
- tapOn: "stats-tab"

- extendedWaitUntil:
    visible:
      id: "stats-screen"
    timeout: 5000

- assertVisible:
    text: "Achievements"

# Verify toggle buttons exist
- assertVisible:
    id: "stats-week-toggle"
- assertVisible:
    id: "stats-month-toggle"

# Tap Month toggle
- tapOn:
    id: "stats-month-toggle"

- assertVisible:
    text: "This Month Stats"

# Tap Week toggle
- tapOn:
    id: "stats-week-toggle"

- assertVisible:
    text: "This Week Stats"
