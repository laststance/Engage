appId: com.laststance.engage
tags:
  - ios
  - manual
---
# QA-09: Settings Navigation
# Manual redundancy check; QA-11 covers the Settings > Backup path in the main suite.

- launchApp:
    clearState: true

- extendedWaitUntil:
    visible:
      id: "calendar-screen"
    timeout: 10000

# Navigate to Stats tab
- tapOn: "stats-tab"

- extendedWaitUntil:
    visible:
      id: "stats-screen"
    timeout: 5000

# Tap settings button
- tapOn:
    id: "settings-button"

- extendedWaitUntil:
    visible:
      text: "Settings"
    timeout: 5000

# Verify all settings menu items
- assertVisible:
    id: "settings-notifications"
- assertVisible:
    id: "settings-language"
- assertVisible:
    id: "settings-backup"

# Open notification settings and verify the permission-state surface
- tapOn:
    id: "settings-notifications"

- extendedWaitUntil:
    visible:
      text: "Daily Reminder"
    timeout: 5000

- assertVisible:
    text: "Notification Status"
- assertVisible:
    id: "notification-check-permission"

- tapOn:
    id: "notification-done"

- extendedWaitUntil:
    visible:
      text: "Settings"
    timeout: 5000

# Close settings
- tapOn:
    id: "settings-close"

- extendedWaitUntil:
    visible:
      id: "stats-screen"
    timeout: 5000
