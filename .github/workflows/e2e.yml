name: E2E Tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/e2e.yml'
      - 'app/**'
      - 'src/**'
      - 'components/**'
      - 'hooks/**'
      - 'constants/**'
      - 'assets/**'
      - 'maestro/**'
      - 'ios/**'
      - 'patches/**'
      - 'app.json'
      - 'babel.config.js'
      - 'global.css'
      - 'metro.config.js'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tailwind.config.js'
      - 'tsconfig.json'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/e2e.yml'
      - 'app/**'
      - 'src/**'
      - 'components/**'
      - 'hooks/**'
      - 'constants/**'
      - 'assets/**'
      - 'maestro/**'
      - 'ios/**'
      - 'patches/**'
      - 'app.json'
      - 'babel.config.js'
      - 'global.css'
      - 'metro.config.js'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tailwind.config.js'
      - 'tsconfig.json'
  schedule:
    # Run E2E tests daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Cancel previous runs for the same PR/ref without interrupting unrelated E2E runs
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  e2e-ios:
    name: E2E Tests (iOS)
    runs-on: macos-26
    timeout-minutes: 90
    env:
      APP_READY_WAIT_SECONDS: 180
      BUILD_POLL_INTERVAL_SECONDS: 30
      E2E_BUILD_LOG: e2e-build.log
      E2E_BUILD_READY_TEXT: Logs for your project will appear below
      MAX_BUILD_WAIT_SECONDS: 2700

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.20.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "${HOME}/.maestro/bin" >> "$GITHUB_PATH"

      - name: Setup iOS Simulator
        run: |
          set -euo pipefail

          # List available simulators
          xcrun simctl list devices available

          SIMULATOR_ID=""

          for SIMULATOR_NAME in "iPhone 17 Pro" "iPhone 16 Pro" "iPhone 15 Pro"; do
            SIMULATOR_ID=$(xcrun simctl list devices available | sed -nE "/${SIMULATOR_NAME}/s/.*\(([A-F0-9-]+)\).*/\1/p" | head -n 1)

            if [ -n "$SIMULATOR_ID" ]; then
              echo "Using preferred simulator: ${SIMULATOR_NAME} (${SIMULATOR_ID})"
              break
            fi
          done

          if [ -z "$SIMULATOR_ID" ]; then
            SIMULATOR_ID=$(xcrun simctl list devices available | sed -nE '/iPhone/s/.*\(([A-F0-9-]+)\).*/\1/p' | head -n 1)
            echo "Using first available iPhone simulator: ${SIMULATOR_ID}"
          fi

          if [ -z "$SIMULATOR_ID" ]; then
            echo "::error::No available iPhone simulator found"
            exit 1
          fi

          xcrun simctl boot "$SIMULATOR_ID" || echo "Simulator already booted"
          xcrun simctl bootstatus "$SIMULATOR_ID" -b

      - name: Build E2E production app
        run: |
          # Clean previous builds
          pnpm build:e2e:clean || true

          # Build, install, and launch the production app for testing.
          # `expo run:ios` stays alive to stream Metro logs after launch, so the
          # CI step treats the app launch log line as the readiness signal.
          nohup pnpm build:e2e > "$E2E_BUILD_LOG" 2>&1 &
          BUILD_PID=$!

          SECONDS=0

          while kill -0 "$BUILD_PID" 2>/dev/null; do
            if grep -q "$E2E_BUILD_READY_TEXT" "$E2E_BUILD_LOG"; then
              echo "Build completed and app launched"
              tail -n 80 "$E2E_BUILD_LOG"
              break
            fi

            if [ "$SECONDS" -ge "$MAX_BUILD_WAIT_SECONDS" ]; then
              echo "Build timeout after $MAX_BUILD_WAIT_SECONDS seconds"
              tail -n 120 "$E2E_BUILD_LOG"
              kill "$BUILD_PID" 2>/dev/null || true
              exit 1
            fi

            echo "Building... (${SECONDS}s elapsed)"
            tail -n 20 "$E2E_BUILD_LOG"
            sleep "$BUILD_POLL_INTERVAL_SECONDS"
          done

          if ! kill -0 "$BUILD_PID" 2>/dev/null; then
            wait "$BUILD_PID"
            BUILD_EXIT_CODE=$?

            if [ "$BUILD_EXIT_CODE" -ne 0 ]; then
              echo "Build failed with exit code $BUILD_EXIT_CODE"
              tail -n 120 "$E2E_BUILD_LOG"
              exit 1
            fi

            echo "Build command exited successfully"
            tail -n 80 "$E2E_BUILD_LOG"
          fi

          echo "$BUILD_PID" > .e2e-build.pid

      - name: Wait for app to be ready
        run: |
          # Wait for app to fully start.
          echo "Waiting for app to be ready..."
          sleep "$APP_READY_WAIT_SECONDS"

          # Verify app is running
          xcrun simctl list | grep Booted

      - name: Run Maestro E2E tests
        run: |
          # Run all E2E tests
          pnpm test:e2e:production

      - name: Upload Maestro test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: maestro-test-results
          path: |
            ~/.maestro/tests/**/*
            maestro-results.xml
          retention-days: 30

      - name: Upload app logs
        if: always()
        run: |
          # Capture simulator logs
          xcrun simctl spawn booted log collect --output sim-logs.logarchive || true

      - name: Upload simulator logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: simulator-logs
          path: sim-logs.logarchive
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          if [ -f .e2e-build.pid ]; then
            kill "$(cat .e2e-build.pid)" 2>/dev/null || true
          fi

          # Kill all Expo and DevTools processes
          pnpm build:e2e:clean || true

          # Shutdown simulator
          xcrun simctl shutdown all || true

  e2e-android:
    name: E2E Tests (Android)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # @TODO Currently disabled - set repository variable ENABLE_ANDROID_E2E=true when Android E2E tests are implemented
    if: ${{ vars.ENABLE_ANDROID_E2E == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.20.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "${HOME}/.maestro/bin" >> "$GITHUB_PATH"

      - name: Setup Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: pnpm test:e2e:android

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: maestro-test-results-android
          path: ~/.maestro/tests/**/*
          retention-days: 30

  e2e-summary:
    name: E2E Test Summary
    runs-on: ubuntu-latest
    needs: [e2e-ios]
    if: always()

    steps:
      - name: Check E2E results
        run: |
          {
            echo "## E2E Test Summary"
            echo ""
            echo "- iOS E2E: ${{ needs.e2e-ios.result }}"
            echo "- Android E2E: skipped unless ENABLE_ANDROID_E2E=true"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ needs.e2e-ios.result }}" != "success" ]; then
            {
              echo ""
              echo "⚠️ E2E tests failed. Check the logs for details."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          {
            echo ""
            echo "✅ All E2E tests passed successfully!"
          } >> "$GITHUB_STEP_SUMMARY"
